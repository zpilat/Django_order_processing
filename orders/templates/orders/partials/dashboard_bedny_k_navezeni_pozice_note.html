{% if mode == 'form' %}
<div id="{{ target_id }}">
  <form hx-post="{% url 'dashboard_bedny_k_navezeni_pozice_poznamka' %}" hx-target="#{{ target_id }}" hx-swap="outerHTML" class="d-flex flex-wrap align-items-center gap-2">
    {% csrf_token %}
    <input type="hidden" name="pozice_id" value="{{ pozice_id }}" />
    <textarea name="poznamka" class="form-control form-control-sm" style="min-width: 260px;" rows="3" placeholder="Poznámka k celé pozici">{{ poznamka }}</textarea>
    <div class="d-flex gap-1">
      <button type="submit" class="btn btn-sm btn-primary">Uložit</button>
      <button type="button" class="btn btn-sm btn-secondary"
        hx-get="{% url 'dashboard_bedny_k_navezeni_pozice_poznamka' %}?pozice_id={{ pozice_id }}"
        hx-target="#{{ target_id }}" hx-swap="outerHTML">Zrušit</button>
    </div>
  </form>
</div>
{% else %}
<div id="{{ target_id }}">
  <button type="button" class="btn btn-sm btn-outline-secondary w-100 text-start py-1"
    hx-get="{% url 'dashboard_bedny_k_navezeni_pozice_poznamka' %}?pozice_id={{ pozice_id }}&mode=form"
    hx-target="#{{ target_id }}" hx-swap="outerHTML">
    <span class="d-block text-start" style="white-space: pre-line; line-height: 1.2;">{{ poznamka|default:"Poznámka k pozici..." }}</span>
  </button>
</div>
{% endif %}
