<div id="bedny-list-content">
    <div class="container-fluid px-0 py-2">
        <div class="mx-auto" style="max-width: 760px;">
            <section class="border rounded-2 overflow-hidden mb-3">
                <div class="px-3 py-2 fw-bold"
                     style="background-color: #214290; color: #ffde17; font-family: 'Liberation Sans', Arial;">
                    Filtr beden
                </div>
                <form
                    method="GET"
                    hx-get="."
                    hx-target="#bedny-list-content"
                    hx-swap="outerHTML"
                    hx-push-url="true"
                    hx-trigger="change, keyup delay:400ms from:input, submit"
                    class="row align-items-end small g-2 p-3 bg-light"
                >
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="zakaznik_filter" class="form-label small fw-semibold mb-1">Zákazník</label>
                        <select name="zakaznik_filter" class="form-select form-select-sm" id="zakaznik_filter">
                            {% for value, label in zakaznik_choices %}
                                <option value="{{ value }}" {% if zakaznik_filter == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="stav_filter" class="form-label small fw-semibold mb-1">Stav bedny</label>
                        <select name="stav_filter" class="form-select form-select-sm" id="stav_filter">
                            {% for value, label in stav_choices %}
                                <option value="{{ value }}" {% if stav_filter == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="zakazka_priorita_filter" class="form-label small fw-semibold mb-1">Priorita</label>
                        <select name="zakazka_priorita_filter" class="form-select form-select-sm" id="zakazka_priorita_filter">
                            {% for value, label in zakazka_priorita_choices %}
                                <option value="{{ value }}" {% if zakazka_priorita_filter == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="fake_skupina_TZ_filter" class="form-label small fw-semibold mb-1">TZ</label>
                        <select name="fake_skupina_TZ_filter" class="form-select form-select-sm" id="fake_skupina_TZ_filter">
                            {% for value, label in fake_skupina_TZ_choices %}
                                <option value="{{ value }}" {% if fake_skupina_TZ_filter == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="pozastaveno_filter" class="form-label small fw-semibold mb-1">Pozastaveno</label>
                        <select name="pozastaveno_filter" class="form-select form-select-sm" id="pozastaveno_filter">
                            {% for value, label in pozastaveno_choices %}
                                <option value="{{ value }}" {% if pozastaveno_filter == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="delka_filter" class="form-label small fw-semibold mb-1">Délka</label>
                        <select name="delka_filter" class="form-select form-select-sm" id="delka_filter">
                            {% for value, label in delka_choices %}
                                <option value="{{ value }}" {% if delka_filter == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3">
                        <label for="query" class="form-label small fw-semibold mb-1">Vyhledat</label>
                        <input id="query"
                               class="form-control form-control-sm"
                               type="text"
                               name="query"
                               placeholder="Číslo bedny"
                               value="{{ query }}">
                    </div>
                    <input type="hidden" name="sort" value="{{ sort }}">
                    <input type="hidden" name="order" value="{{ order }}">
                </form>
            </section>
        </div>
    </div>

    <div id="bedna-change-container" class="container-fluid px-0 mx-auto mb-1"></div>

    <div id="listview-table">
        {% include "orders/partials/bedny_list_table.html" %}
    </div>
</div>
