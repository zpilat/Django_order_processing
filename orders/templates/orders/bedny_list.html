{% extends "orders/base.html" %}
{% load static %}
{% load custom_filters %}

{% block extra_head %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'orders/css/scan_workflows.css' %}">
<style>
    #bedna-change-container {
        display: block;
    }
    #bedna-change-container:empty {
        display: none;
    }
    #bedna-change-container #bedna-change-banner-inline {
        display: flex;
        justify-content: center;
    }
    #bedna-change-container #bedna-change-banner-inline > span {
        display: none !important;
    }
    #bedna-change-container #bedna-change-banner-inline button {
        background-color: #214290;
        border: 1px solid #214290;
        border-radius: 0.25rem;
        color: #ffde17;
        font-size: 0.875rem;
        font-weight: 700;
        line-height: 1.5;
        padding: 0.375rem 0.75rem;
    }
    #bedna-change-container #bedna-change-banner-inline button::before {
        content: "Data se změnila - ";
    }
    #bedna-change-container #bedna-change-banner-inline button:hover,
    #bedna-change-container #bedna-change-banner-inline button:focus {
        background-color: #1b3676;
        border-color: #1b3676;
        color: #ffde17;
    }
</style>
<script>
window.bednaPollConfig = {
    pollUrl: "{{ bedna_poll_url|escapejs }}",
    lastChange: {% if bedna_last_change %}"{{ bedna_last_change|escapejs }}"{% else %}null{% endif %},
    lastChangeId: {% if bedna_last_change_id %}{{ bedna_last_change_id }}{% else %}null{% endif %},
    intervalMs: {{ bedna_poll_interval|default:30000 }},
};
</script>
<script src="{% static 'orders/js/admin_bedna_change_poll.js' %}" defer></script>
{% endblock %}

{% block content %}
<div class="container-fluid px-0 py-2">
    <div class="mx-auto" style="max-width: 760px;">
        <section class="border rounded-2 overflow-hidden mb-3">
            <div class="px-3 py-2 fw-bold"
                 style="background-color: #214290; color: #ffde17; font-family: 'Liberation Sans', Arial;">
                Filtr beden
            </div>
            <form
                method="GET"
                hx-get="."
                hx-target="#listview-table"
                hx-push-url="true"
                hx-trigger="change, keyup delay:400ms from:input, submit"
                class="row align-items-end small g-2 p-3 bg-light"
            >
                <div class="col-12 col-sm-3">
                    <label for="zakaznik_filter" class="form-label small fw-semibold mb-1">Zákazník</label>
                    <select name="zakaznik_filter" class="form-select form-select-sm" id="zakaznik_filter">
                        {% for value, label in zakaznik_choices %}
                            <option value="{{ value }}" {% if zakaznik_filter == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-3">
                    <label for="stav_filter" class="form-label small fw-semibold mb-1">Stav bedny</label>
                    <select name="stav_filter" class="form-select form-select-sm" id="stav_filter">
                        {% for value, label in stav_choices %}
                            <option value="{{ value }}" {% if stav_filter == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-3">
                    <label for="delka_filter" class="form-label small fw-semibold mb-1">Délka</label>
                    <select name="delka_filter" class="form-select form-select-sm" id="delka_filter">
                        {% for value, label in delka_choices %}
                            <option value="{{ value }}" {% if delka_filter == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-3">
                    <label for="query" class="form-label small fw-semibold mb-1">Vyhledat</label>
                    <input id="query"
                           class="form-control form-control-sm"
                           type="text"
                           name="query"
                           placeholder="Číslo bedny"
                           value="{{ query }}">
                </div>
                <input type="hidden" name="sort" value="{{ sort }}">
                <input type="hidden" name="order" value="{{ order }}">
            </form>
        </section>
    </div>
</div>

<div class="container-fluid px-0 mb-2">
    <div id="bedna-change-container" class="mx-auto" style="max-width: 760px;"></div>
</div>

<div id="listview-table">
    {% include "orders/partials/bedny_list_table.html" %}
</div>
{% endblock %}
